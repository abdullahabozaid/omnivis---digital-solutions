<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tawfeeq | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              gold: {
                50: '#fdfaf3',
                100: '#faf3e0',
                200: '#f5e6c4',
                300: '#e8d5a3',
                400: '#d4bc7c',
                500: '#c9a962',
                600: '#b8944d',
                700: '#9a7840',
                800: '#7d6238',
                900: '#665130',
              },
              // Dark mode specific colors - WCAG AA compliant
              dark: {
                bg: '#09090b',        // zinc-950 - darkest background
                card: '#18181b',      // zinc-900 - card/panel background
                elevated: '#27272a',  // zinc-800 - elevated elements
                border: '#3f3f46',    // zinc-700 - visible borders
                hover: '#3f3f46',     // zinc-700 - hover states
                text: '#fafafa',      // zinc-50 - primary text (white)
                muted: '#a1a1aa',     // zinc-400 - secondary text
                subtle: '#71717a',    // zinc-500 - tertiary/disabled text
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }

      /* Animation keyframes for micro-interactions */
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes slideInFromTop {
        from { transform: translateY(-8px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }

      @keyframes slideInFromBottom {
        from { transform: translateY(16px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }

      @keyframes zoomIn {
        from { transform: scale(0.95); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }

      @keyframes slideInRight {
        from { transform: translateX(100%); }
        to { transform: translateX(0); }
      }

      /* Animation utility classes */
      .animate-in {
        animation-duration: 200ms;
        animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
        animation-fill-mode: forwards;
      }

      .fade-in {
        animation-name: fadeIn;
      }

      .slide-in-from-top-2 {
        animation-name: slideInFromTop;
      }

      .slide-in-from-bottom-4 {
        animation-name: slideInFromBottom;
      }

      .zoom-in-95 {
        animation-name: zoomIn;
      }

      .duration-200 {
        animation-duration: 200ms;
      }

      .duration-300 {
        animation-duration: 300ms;
      }

      /* Smooth scrollbar styling */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb {
        background: #c9a962;
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #b8944d;
      }

      /* Dark mode scrollbar */
      .dark ::-webkit-scrollbar-track {
        background: #1a1a1a;
      }

      .dark ::-webkit-scrollbar-thumb {
        background: #9a7840;
      }

      .dark ::-webkit-scrollbar-thumb:hover {
        background: #c9a962;
      }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",

    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.561.0"
  }
}
</script>

  </head>

    <div id="root"></div>

  </body>
</html>
